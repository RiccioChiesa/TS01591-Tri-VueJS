<!DOCTYPE html>
<html lang="en">
<head>
<title>Bootstrap 5</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="css/bootstrap.min.css">
<!-- Bootstrap JS -->
<script src="js/bootstrap.bundle.min.js"></script>
</head>
<body>
       <div class="container">
        <div class="row">
            
            <div class="col-sm-4">
                <h3 class="text-info mb-3">Về tôi</h3>
                <div class="card mb-4">
                    <img src="images/avatar.png" class="card-img-top p-3 rounded-circle" alt="Avatar">
                    <div class="card-body">
                        <h5 class="card-title">Giới thiệu bản thân</h5>
                        <p class="card-text small">
                            TS. Trần Hoàng, Tổ chức Tư vấn sức khỏe quốc tế độc lập.<br>
                            <em>Châm ngôn: Ta không được chọn nơi mình sinh ra, nhưng ta được chọn cách mình sẽ sống.</em>
                        </p>
                    </div>
                </div>

                <h3 class="text-info mt-2">Chuyên mục</h3>
                <ul class="list-group mb-4">
                    <li class="list-group-item active bg-info border-info d-flex justify-content-between align-items-center">
                        <a class="nav-link text-white" href="#">Chế độ tập</a>
                        <span class="badge bg-primary rounded-pill">12</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <a class="nav-link text-dark" href="#">Chế độ dinh dưỡng</a>
                        <span class="badge bg-primary rounded-pill">15</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <a class="nav-link text-dark" href="#">Cẩm nang cuộc sống</a>
                        <span class="badge bg-primary rounded-pill">99</span>
                    </li>
                </ul>
            </div>


</body>
